<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>フリーペーパー 読者アンケート集計</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-datalabels/2.2.0/chartjs-plugin-datalabels.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700;900&family=Bebas+Neue&display=swap');

  :root {
    --bg: #0d0d0d;
    --surface: #161616;
    --card: #1e1e1e;
    --border: #2a2a2a;
    --accent: #e8b84b;
    --accent2: #c0392b;
    --text: #f0f0f0;
    --muted: #888;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    min-height: 100vh;
  }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 20px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 4px;
    color: var(--accent);
  }

  .logo span { color: var(--text); font-size: 13px; font-family: 'Noto Sans JP', sans-serif; font-weight: 300; display: block; letter-spacing: 2px; margin-top: -4px; }

  .status-bar {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 12px;
    color: var(--muted);
  }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #27ae60;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  #last-updated { font-size: 11px; color: var(--muted); }

  .issue-tabs {
    display: flex;
    gap: 0;
    padding: 20px 32px 0;
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
  }

  .tab {
    padding: 10px 20px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    border-bottom: 3px solid transparent;
    color: var(--muted);
    white-space: nowrap;
    transition: all 0.2s;
    background: none;
    border-top: none;
    border-left: none;
    border-right: none;
  }

  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  .main {
    padding: 28px 32px;
    max-width: 1400px;
    margin: 0 auto;
  }

  .kpi-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 16px;
    margin-bottom: 28px;
  }

  .kpi {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    position: relative;
    overflow: hidden;
  }

  .kpi::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--accent);
  }

  .kpi-label {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .kpi-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 42px;
    color: var(--accent);
    line-height: 1;
  }

  .kpi-sub { font-size: 11px; color: var(--muted); margin-top: 4px; }

  .charts-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 20px;
  }

  .charts-grid.wide { grid-template-columns: 1fr; }

  .chart-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
  }

  .chart-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .chart-title::before {
    content: '';
    width: 4px; height: 16px;
    background: var(--accent);
    border-radius: 2px;
  }

  .chart-wrap {
    position: relative;
    height: 240px;
  }

  .chart-wrap.tall { height: 320px; }

  .divider-label {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 12px 0 4px;
    border-top: 1px solid var(--border);
    margin-top: 8px;
  }

  .source-note {
    text-align: center;
    font-size: 11px;
    color: var(--muted);
    padding: 20px;
    border-top: 1px solid var(--border);
    margin-top: 8px;
  }

  /* Google連携バナー */
  .connect-banner {
    background: linear-gradient(135deg, #1a1a2e, #16213e);
    border: 1px solid #e8b84b44;
    border-radius: 12px;
    padding: 20px 24px;
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }

  .connect-banner .info { flex: 1; }
  .connect-banner .title { font-size: 14px; font-weight: 700; color: var(--accent); margin-bottom: 4px; }
  .connect-banner .desc { font-size: 12px; color: var(--muted); line-height: 1.6; }

  .connect-input {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-shrink: 0;
  }

  .connect-input input {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    color: var(--text);
    font-size: 12px;
    width: 320px;
    outline: none;
    font-family: 'Noto Sans JP', sans-serif;
  }

  .connect-input input:focus { border-color: var(--accent); }

  .btn {
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 8px;
    padding: 8px 16px;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    white-space: nowrap;
    transition: opacity 0.2s;
  }

  .btn:hover { opacity: 0.85; }
  .btn.secondary { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
  .btn.pdf { background: #c0392b; color: #fff; }

  /* PDFオーバーレイ */
  #pdf-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 9999;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
  }
  #pdf-overlay.active { display: flex; }
  #pdf-overlay .msg { color: #fff; font-size: 14px; font-family: 'Noto Sans JP', sans-serif; }
  #pdf-overlay .spinner {
    width: 48px; height: 48px;
    border: 4px solid #333;
    border-top-color: #e8b84b;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 768px) {
    .charts-grid { grid-template-columns: 1fr; }
    .connect-banner { flex-direction: column; }
    .connect-input { width: 100%; }
    .connect-input input { width: 100%; }
    header { padding: 16px 20px; }
    .main { padding: 20px; }
    .issue-tabs { padding: 16px 20px 0; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    FREEC
    <span>すすきの フリーペーパー</span>
  </div>
  <div class="status-bar">
    <div class="status-dot"></div>
    <span>自動集計</span>
    <span id="last-updated">—</span>
    <button class="btn pdf" onclick="exportPDF()" style="margin-left:12px;">📄 PDFレポート出力</button>
  </div>
</header>

<!-- PDFレンダリング中オーバーレイ -->
<div id="pdf-overlay">
  <div class="spinner"></div>
  <div class="msg" id="pdf-msg">PDFを生成しています...</div>
</div>

<div class="issue-tabs" id="issueTabs"></div>

<div class="main">

  <div class="connect-banner">
    <div class="info">
      <div class="title">📊 号ごとのGoogleフォーム連携設定</div>
      <div class="desc">各号のGoogleスプレッドシートCSV公開URLを登録すると、タブに自動追加されリアルタイムで集計されます。<br>設定方法：スプレッドシート → ファイル → 共有 → 「Webに公開」→ CSV形式でURLをコピー</div>
    </div>
    <button class="btn" onclick="toggleSettings()">⚙️ URL設定を開く</button>
  </div>

  <div id="settingsPanel" style="display:none; background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:24px; margin-bottom:24px;">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
      <div style="font-size:13px; font-weight:700; color:var(--accent); letter-spacing:1px;">号ごとのCSV URL登録</div>
      <button class="btn secondary" onclick="toggleSettings()">✕ 閉じる</button>
    </div>
    <div id="urlList" style="display:flex; flex-direction:column; gap:10px; margin-bottom:16px;"></div>
    <div style="display:flex; gap:8px; align-items:center; padding-top:12px; border-top:1px solid var(--border);">
      <select id="newIssueName" style="background:var(--card); border:1px solid var(--border); border-radius:8px; padding:8px 12px; color:var(--text); font-size:12px; font-family:'Noto Sans JP',sans-serif; outline:none;">
        <option value="">── 号を選択 ──</option>
        <option value="3月号">3月号</option>
        <option value="4月号">4月号</option>
        <option value="5月号">5月号</option>
        <option value="6月号">6月号</option>
        <option value="7月号">7月号</option>
        <option value="8月号">8月号</option>
        <option value="9月号">9月号</option>
        <option value="10月号">10月号</option>
        <option value="11月号">11月号</option>
        <option value="12月号">12月号</option>
      </select>
      <input type="text" id="newIssueUrl" placeholder="GoogleスプレッドシートのCSV公開URL" style="flex:1; background:var(--card); border:1px solid var(--border); border-radius:8px; padding:8px 12px; color:var(--text); font-size:12px; outline:none; font-family:'Noto Sans JP',sans-serif;" />
      <button class="btn" onclick="addIssueUrl()">＋ 追加して読み込む</button>
    </div>
    <div style="font-size:11px; color:var(--muted); margin-top:10px;">💡 登録したURLは5分ごとに自動更新されます</div>
  </div>

  <div class="kpi-row" id="kpiRow"></div>

  <div class="charts-grid">
    <div class="chart-card">
      <div class="chart-title">男女比</div>
      <div class="chart-wrap"><canvas id="genderChart"></canvas></div>
    </div>
    <div class="chart-card">
      <div class="chart-title">居住地</div>
      <div class="chart-wrap"><canvas id="locationChart"></canvas></div>
    </div>
  </div>

  <div class="charts-grid">
    <div class="chart-card">
      <div class="chart-title">年代別</div>
      <div class="chart-wrap"><canvas id="ageChart"></canvas></div>
    </div>
    <div class="chart-card">
      <div class="chart-title">来訪目的</div>
      <div class="chart-wrap"><canvas id="purposeChart"></canvas></div>
    </div>
  </div>

  <div class="charts-grid wide">
    <div class="chart-card">
      <div class="chart-title">よく行くお店ジャンル</div>
      <div class="chart-wrap tall"><canvas id="genreChart"></canvas></div>
    </div>
  </div>

  <div class="source-note" id="sourceNote">表示中：サンプルデータ（3月号・4月号）　|　Googleスプレッドシート連携で自動更新されます</div>
</div>

<script>
// ====== データ定義 ======
const ISSUES = {
  '3月号': {
    total: 33,
    gender: { '男性': 19, '女性': 14 },
    location: { '札幌市内': 27, '札幌市外（道内）': 5, '道外': 0, '海外': 1 },
    age: { '20代': 9, '30代': 9, '40代': 5, '50代': 10, '60代': 0, '70代以上': 0 },
    purpose: { '観光': 2, '出張（道内）': 0, '出張（道外）': 0, '帰省': 0, '日常利用（地元）': 22, '仕事（地元）': 9 },
    genre: { 'バー': 14, 'ダーツバー': 5, 'シーシャバー': 1, 'カジュアルバー': 7, 'コンセプトバー': 1, 'カジュアルパブ': 0, 'ライブ': 3, 'ショー': 0, 'クラブ': 0, 'ガールズバー': 2, 'スナック': 12, 'パブ': 0, 'ニュークラブ': 2, 'ラウンジ': 0 }
  },
  '4月号': {
    total: 66,
    gender: { '男性': 35, '女性': 31 },
    location: { '札幌市内': 57, '札幌市外（道内）': 9, '道外': 0, '海外': 0 },
    age: { '20代': 19, '30代': 20, '40代': 15, '50代': 6, '60代': 5, '70代以上': 1 },
    purpose: { '観光': 5, '出張（道内）': 1, '出張（道外）': 0, '帰省': 1, '日常利用（地元）': 42, '仕事（地元）': 17 },
    genre: { 'バー': 43, 'ダーツバー': 9, 'シーシャバー': 3, 'カジュアルバー': 12, 'コンセプトバー': 2, 'カジュアルパブ': 1, 'ライブ': 13, 'ショー': 1, 'クラブ': 3, 'ガールズバー': 5, 'スナック': 13, 'パブ': 3, 'ニュークラブ': 8, 'ラウンジ': 4 }
  }
};

const PALETTE = {
  accent: '#e8b84b', red: '#c0392b', blue: '#2980b9', green: '#27ae60',
  purple: '#8e44ad', orange: '#e67e22', teal: '#16a085', pink: '#e91e63',
};

const MULTI_COLORS = [
  '#e8b84b','#c0392b','#2980b9','#27ae60','#8e44ad','#e67e22','#16a085','#e91e63','#f39c12','#1abc9c','#3498db','#9b59b6','#e74c3c','#2ecc71'
];

let currentIssue = '4月号';
let charts = {};

// ====== 号タブ生成 ======
function buildTabs() {
  const container = document.getElementById('issueTabs');
  container.innerHTML = '';
  const allIssues = ['3月号','4月号','5月号','6月号','7月号','8月号','9月号','10月号','11月号','12月号'];
  allIssues.forEach(issue => {
    const btn = document.createElement('button');
    btn.className = 'tab' + (issue === currentIssue ? ' active' : '');
    btn.dataset.issue = issue;
    const hasLive = !!ISSUE_URLS[issue];
    btn.textContent = issue + (hasLive ? ' 🔴' : '');
    if (!ISSUES[issue]) { btn.style.opacity = '0.3'; btn.disabled = true; }
    btn.onclick = () => selectIssue(issue, btn);
    container.appendChild(btn);
  });
}

function rebuildTabs() {
  buildTabs();
}

function selectIssue(issue, btn) {
  if (!ISSUES[issue]) return;
  currentIssue = issue;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  renderAll();
}

// ====== KPI ======
function renderKPI(data) {
  const row = document.getElementById('kpiRow');
  const genderTotal = Object.values(data.gender).reduce((a,b)=>a+b,0);
  const maleRate = genderTotal ? Math.round(data.gender['男性'] / genderTotal * 100) : 0;
  const locTotal = Object.values(data.location).reduce((a,b)=>a+b,0);
  const localRate = locTotal ? Math.round((data.location['札幌市内'] || 0) / locTotal * 100) : 0;
  const topAge = Object.entries(data.age).sort((a,b)=>b[1]-a[1])[0][0];
  const topPurpose = Object.entries(data.purpose).sort((a,b)=>b[1]-a[1])[0][0];

  row.innerHTML = `
    <div class="kpi"><div class="kpi-label">総回答数</div><div class="kpi-value">${data.total}</div><div class="kpi-sub">件</div></div>
    <div class="kpi"><div class="kpi-label">男性比率</div><div class="kpi-value">${maleRate}%</div><div class="kpi-sub">女性 ${100-maleRate}%</div></div>
    <div class="kpi"><div class="kpi-label">札幌市内率</div><div class="kpi-value">${localRate}%</div><div class="kpi-sub">地元読者</div></div>
    <div class="kpi"><div class="kpi-label">最多年代</div><div class="kpi-value" style="font-size:28px;padding-top:8px">${topAge}</div><div class="kpi-sub"> </div></div>
    <div class="kpi"><div class="kpi-label">主な来訪目的</div><div class="kpi-value" style="font-size:16px;padding-top:10px">${topPurpose}</div><div class="kpi-sub"> </div></div>
  `;
}

// datalabelsプラグイン登録
Chart.register(ChartDataLabels);

// ====== ラベル共通ヘルパー ======
function pct(value, data) {
  const total = data.reduce((a, b) => a + b, 0);
  return total > 0 ? Math.round(value / total * 100) : 0;
}

const commonTooltip = {
  backgroundColor: '#1e1e1e', borderColor: '#333', borderWidth: 1,
  titleColor: '#e8b84b', bodyColor: '#ccc',
  callbacks: {
    label: ctx => {
      const total = ctx.dataset.data.reduce((a,b)=>a+b,0);
      const p = total > 0 ? Math.round(ctx.parsed * 100 / total) : 0;
      return ` ${ctx.label}: ${ctx.parsed}件 (${p}%)`;
    }
  }
};

function destroyChart(id) {
  if (charts[id]) { charts[id].destroy(); delete charts[id]; }
}

function renderGender(data) {
  destroyChart('gender');
  const labels = Object.keys(data.gender).filter(k => data.gender[k] > 0);
  const values = labels.map(k => data.gender[k]);
  charts.gender = new Chart(document.getElementById('genderChart'), {
    type: 'doughnut',
    data: { labels, datasets: [{ data: values, backgroundColor: [PALETTE.blue, PALETTE.pink], borderWidth: 0 }] },
    options: {
      responsive: true, maintainAspectRatio: false, cutout: '55%',
      plugins: {
        legend: { labels: { color: '#ccc', font: { family: 'Noto Sans JP', size: 11 }, padding: 12, boxWidth: 12 } },
        tooltip: commonTooltip,
        datalabels: {
          color: '#fff', font: { family: 'Noto Sans JP', size: 12, weight: 'bold' },
          formatter: (value, ctx) => { const p = pct(value, ctx.dataset.data); return p > 0 ? `${value}件\n${p}%` : ''; },
          textAlign: 'center', display: ctx => ctx.dataset.data[ctx.dataIndex] > 0
        }
      }
    }
  });
}

function renderLocation(data) {
  destroyChart('location');
  const entries = Object.entries(data.location).filter(([,v]) => v > 0);
  const labels = entries.map(([k]) => k);
  const values = entries.map(([,v]) => v);
  charts.location = new Chart(document.getElementById('locationChart'), {
    type: 'doughnut',
    data: { labels, datasets: [{ data: values, backgroundColor: [PALETTE.accent, PALETTE.green, PALETTE.orange, PALETTE.purple], borderWidth: 0 }] },
    options: {
      responsive: true, maintainAspectRatio: false, cutout: '55%',
      plugins: {
        legend: { labels: { color: '#ccc', font: { family: 'Noto Sans JP', size: 11 }, padding: 12, boxWidth: 12 } },
        tooltip: commonTooltip,
        datalabels: {
          color: '#fff', font: { family: 'Noto Sans JP', size: 11, weight: 'bold' },
          formatter: (value, ctx) => { const p = pct(value, ctx.dataset.data); return p > 0 ? `${value}件\n${p}%` : ''; },
          textAlign: 'center', display: ctx => ctx.dataset.data[ctx.dataIndex] > 0
        }
      }
    }
  });
}

function makeBarDatalabels() {
  return {
    color: '#eee', font: { family: 'Noto Sans JP', size: 10, weight: 'bold' },
    anchor: 'end', align: 'end', offset: 4,
    formatter: (value, ctx) => {
      if (!value) return '';
      const p = pct(value, ctx.dataset.data);
      return `${value}件 (${p}%)`;
    },
    display: ctx => ctx.dataset.data[ctx.dataIndex] > 0
  };
}

function renderAge(data) {
  destroyChart('age');
  const labels = Object.keys(data.age);
  const values = Object.values(data.age);
  const maxVal = Math.max(...values);
  charts.age = new Chart(document.getElementById('ageChart'), {
    type: 'bar',
    data: { labels, datasets: [{ data: values, backgroundColor: labels.map((_, i) => MULTI_COLORS[i % MULTI_COLORS.length] + 'cc'), borderColor: labels.map((_, i) => MULTI_COLORS[i % MULTI_COLORS.length]), borderWidth: 1, borderRadius: 6 }] },
    options: {
      responsive: true, maintainAspectRatio: false,
      layout: { padding: { top: 28 } },
      plugins: { legend: { display: false }, tooltip: commonTooltip, datalabels: makeBarDatalabels() },
      scales: {
        x: { ticks: { color: '#aaa', font: { family: 'Noto Sans JP', size: 11 } }, grid: { display: false } },
        y: { ticks: { color: '#aaa', font: { family: 'Noto Sans JP', size: 11 } }, grid: { color: '#2a2a2a' }, beginAtZero: true, max: Math.ceil(maxVal * 1.3) }
      }
    }
  });
}

function renderPurpose(data) {
  destroyChart('purpose');
  const entries = Object.entries(data.purpose).filter(([,v]) => v > 0);
  const labels = entries.map(([k]) => k);
  const values = entries.map(([,v]) => v);
  const maxVal = Math.max(...values);
  charts.purpose = new Chart(document.getElementById('purposeChart'), {
    type: 'bar',
    data: { labels, datasets: [{ data: values, backgroundColor: PALETTE.teal + 'cc', borderColor: PALETTE.teal, borderWidth: 1, borderRadius: 6 }] },
    options: {
      responsive: true, maintainAspectRatio: false, indexAxis: 'y',
      layout: { padding: { right: 90 } },
      plugins: {
        legend: { display: false }, tooltip: commonTooltip,
        datalabels: { color: '#eee', font: { family: 'Noto Sans JP', size: 10, weight: 'bold' }, anchor: 'end', align: 'end', offset: 4, formatter: (value, ctx) => { if (!value) return ''; const p = pct(value, ctx.dataset.data); return `${value}件 (${p}%)`; }, display: ctx => ctx.dataset.data[ctx.dataIndex] > 0 }
      },
      scales: {
        x: { ticks: { color: '#aaa', font: { family: 'Noto Sans JP', size: 10 } }, grid: { color: '#2a2a2a' }, beginAtZero: true, max: Math.ceil(maxVal * 1.5) },
        y: { ticks: { color: '#aaa', font: { family: 'Noto Sans JP', size: 10 } }, grid: { display: false } }
      }
    }
  });
}

function renderGenre(data) {
  destroyChart('genre');
  const entries = Object.entries(data.genre).filter(([,v]) => v > 0).sort((a,b)=>b[1]-a[1]);
  const labels = entries.map(([k]) => k);
  const values = entries.map(([,v]) => v);
  const maxVal = Math.max(...values);
  charts.genre = new Chart(document.getElementById('genreChart'), {
    type: 'bar',
    data: { labels, datasets: [{ data: values, backgroundColor: labels.map((_, i) => MULTI_COLORS[i % MULTI_COLORS.length] + 'cc'), borderColor: labels.map((_, i) => MULTI_COLORS[i % MULTI_COLORS.length]), borderWidth: 1, borderRadius: 6 }] },
    options: {
      responsive: true, maintainAspectRatio: false,
      layout: { padding: { top: 30 } },
      plugins: { legend: { display: false }, tooltip: commonTooltip, datalabels: makeBarDatalabels() },
      scales: {
        x: { ticks: { color: '#aaa', font: { family: 'Noto Sans JP', size: 11 } }, grid: { display: false } },
        y: { ticks: { color: '#aaa', font: { family: 'Noto Sans JP', size: 11 } }, grid: { color: '#2a2a2a' }, beginAtZero: true, max: Math.ceil(maxVal * 1.3) }
      }
    }
  });
}

function renderAll() {
  const data = ISSUES[currentIssue];
  if (!data) return;
  renderKPI(data);
  renderGender(data);
  renderLocation(data);
  renderAge(data);
  renderPurpose(data);
  renderGenre(data);
  document.getElementById('last-updated').textContent = '最終更新: ' + new Date().toLocaleString('ja-JP');
}

// ====== 号ごとURL管理 ======
const ISSUE_URLS = {
  "3月号": "https://docs.google.com/spreadsheets/d/e/2PACX-1vQyMRPwe-1FmDalbVFhngWWEacrv5quFsBwhP3cU4ZQH7vSibp1q32EfU2xVBBPHF2GXKN8bBoVXqNd/pub?gid=420156692&single=true&output=csv",
  "4月号": "https://docs.google.com/spreadsheets/d/e/2PACX-1vS1-83v_4tNqGuIWTQzllqPYOOamv7F6UhaO53IP863x6brHaR0LaKS4sRlQ5tdpzaj90Q89Fq4yM0-/pub?gid=1405160854&single=true&output=csv",
  "5月号": "https://docs.google.com/spreadsheets/d/e/2PACX-1vT9Gi34IZW6mHKnFEuSS82_bk2Ch5jzqVZylGv7l3M47HiVthR3il7aSQXXWVH_cqyYsuxBLVewCt-_/pub?gid=171044816&single=true&output=csv"
};

function toggleSettings() {
  const panel = document.getElementById('settingsPanel');
  panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
  renderUrlList();
}

function renderUrlList() {
  const container = document.getElementById('urlList');
  const entries = Object.entries(ISSUE_URLS);
  if (entries.length === 0) {
    container.innerHTML = '<div style="font-size:12px; color:var(--muted); padding:8px 0;">まだURLが登録されていません</div>';
    return;
  }
  container.innerHTML = entries.map(([issue, url]) => `
    <div style="display:flex; align-items:center; gap:8px; background:var(--card); border:1px solid var(--border); border-radius:8px; padding:10px 14px;">
      <span style="font-size:12px; font-weight:700; color:var(--accent); white-space:nowrap; min-width:60px;">${issue}</span>
      <span style="font-size:11px; color:var(--muted); flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${url}</span>
      <button class="btn secondary" style="font-size:11px; padding:4px 10px;" onclick="refreshIssue('${issue}')">🔄 更新</button>
      <button class="btn secondary" style="font-size:11px; padding:4px 10px; color:#e74c3c;" onclick="removeIssue('${issue}')">✕</button>
    </div>
  `).join('');
}

async function addIssueUrl() {
  const issue = document.getElementById('newIssueName').value;
  const url   = document.getElementById('newIssueUrl').value.trim();
  if (!issue) { alert('号を選択してください'); return; }
  if (!url)   { alert('URLを入力してください'); return; }
  if (ISSUE_URLS[issue]) {
    if (!confirm(`${issue} のURLは既に登録されています。上書きしますか？`)) return;
  }
  ISSUE_URLS[issue] = url;
  document.getElementById('newIssueName').value = '';
  document.getElementById('newIssueUrl').value  = '';
  renderUrlList();
  await loadIssueFromUrl(issue, url);
}

async function refreshIssue(issue) {
  if (!ISSUE_URLS[issue]) return;
  await loadIssueFromUrl(issue, ISSUE_URLS[issue]);
}

function removeIssue(issue) {
  if (!confirm(`${issue} の登録を削除しますか？`)) return;
  delete ISSUE_URLS[issue];
  delete ISSUES[issue];
  renderUrlList();
  rebuildTabs();
  const remaining = Object.keys(ISSUES);
  if (remaining.length > 0) {
    currentIssue = remaining[remaining.length - 1];
    renderAll();
  }
}

// ====== CSV解析 ======
async function loadIssueFromUrl(issueName, url, silent = false) {
  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const text = await res.text();

    function parseCSVRow(line) {
      const result = [];
      let cur = '', inQ = false;
      for (let i = 0; i < line.length; i++) {
        const c = line[i];
        if (c === '"') { inQ = !inQ; }
        else if (c === ',' && !inQ) { result.push(cur.trim()); cur = ''; }
        else { cur += c; }
      }
      result.push(cur.trim());
      return result;
    }

    const lines = text.split('\n').filter(l => l.trim());
    if (lines.length < 2) throw new Error('データが不足しています');

    const headers = parseCSVRow(lines[0]);
    const idxGender  = headers.findIndex(h => h.includes('性別'));
    const idxLoc     = headers.findIndex(h => h.includes('住まい') || h.includes('居住'));
    const idxAge     = headers.findIndex(h => h.includes('年代'));
    const idxPurpose = headers.findIndex(h => h.includes('目的'));
    const idxGenre   = headers.findIndex(h => h.includes('ジャンル'));

    const dataRows = lines.slice(1).map(parseCSVRow).filter(r => r.length > 1 && r.some(c => c));
    const newData = { total: dataRows.length, gender: {}, location: {}, age: {}, purpose: {}, genre: {} };

    dataRows.forEach(row => {
      const count = (obj, key) => { const k = key && key.trim(); if (k) obj[k] = (obj[k] || 0) + 1; };
      if (idxGender >= 0)  count(newData.gender,   row[idxGender]);
      if (idxLoc >= 0)     count(newData.location,  row[idxLoc]);
      if (idxAge >= 0)     count(newData.age,        row[idxAge]);
      if (idxPurpose >= 0) count(newData.purpose,    row[idxPurpose]);
      if (idxGenre >= 0) {
        row[idxGenre].split(/[,、]/).forEach(g => {
          const g2 = g.replace(/^"|"$/g,'').trim();
          if (g2) newData.genre[g2] = (newData.genre[g2] || 0) + 1;
        });
      }
    });

    ISSUES[issueName] = newData;
    rebuildTabs();
    currentIssue = issueName;
    document.querySelectorAll('.tab').forEach(t => {
      t.classList.toggle('active', t.dataset.issue === issueName);
    });
    renderAll();
    document.getElementById('sourceNote').textContent =
      `${issueName} Googleフォーム連携　|　回答数 ${newData.total}件　|　${new Date().toLocaleString('ja-JP')} 取得`;
    return true;
  } catch(e) {
    if (!silent) {
      alert(`⚠️ ${issueName} の読み込みに失敗しました。\nURLとスプレッドシートの公開設定を確認してください。\n\nエラー: ${e.message}`);
    } else {
      console.warn('[自動] ' + issueName + ': ' + e.message);
    }
    return false;
  }
}

// ====== PDF出力 ======
async function exportPDF() {
  const loadedIssues = Object.keys(ISSUES);
  if (loadedIssues.length === 0) {
    alert('データが読み込まれていません。先にGoogleスプレッドシートを連携してください。');
    return;
  }

  const overlay = document.getElementById('pdf-overlay');
  const msg = document.getElementById('pdf-msg');
  overlay.classList.add('active');

  try {
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
    const W = 210, H = 297;

    // ===== 表紙をHTMLで作ってキャプチャ（文字化け防止）=====
    msg.textContent = '表紙を作成中...';

    const coverEl = document.createElement('div');
    coverEl.style.cssText = `
      width:794px; min-height:1123px; background:#1a1a1a;
      font-family:'Noto Sans JP',sans-serif; color:#f0f0f0;
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      padding:60px 48px; box-sizing:border-box; position:relative;
    `;

    // サマリーテーブルの行を生成
    const tableRows = loadedIssues.map((issue, ri) => {
      const data = ISSUES[issue];
      const gt = Object.values(data.gender).reduce((a,b)=>a+b,0);
      const maleR = gt ? Math.round(data.gender['男性']/gt*100) : 0;
      const lt = Object.values(data.location).reduce((a,b)=>a+b,0);
      const localR = lt ? Math.round((data.location['札幌市内']||0)/lt*100) : 0;
      const topAge = Object.entries(data.age).sort((a,b)=>b[1]-a[1])[0][0];
      const bg = ri % 2 === 0 ? '#2a2a2a' : '#222';
      return `<tr style="background:${bg}">
        <td style="padding:10px 14px;color:#e8b84b;font-weight:700;">${issue}</td>
        <td style="padding:10px 14px;text-align:center;">${data.total}件</td>
        <td style="padding:10px 14px;text-align:center;">${maleR}%</td>
        <td style="padding:10px 14px;text-align:center;">${100-maleR}%</td>
        <td style="padding:10px 14px;text-align:center;">${localR}%</td>
        <td style="padding:10px 14px;text-align:center;">${topAge}</td>
      </tr>`;
    }).join('');

    coverEl.innerHTML = `
      <div style="position:absolute;top:0;left:0;right:0;height:6px;background:#e8b84b;"></div>
      <div style="position:absolute;bottom:0;left:0;right:0;height:6px;background:#e8b84b;"></div>
      <div style="font-family:'Bebas Neue',sans-serif;font-size:72px;letter-spacing:8px;color:#e8b84b;margin-bottom:8px;">FREEC</div>
      <div style="font-size:18px;color:#aaa;letter-spacing:3px;margin-bottom:40px;">Reader Survey Report</div>
      <div style="width:100%;height:1px;background:#e8b84b;margin-bottom:32px;"></div>
      <div style="font-size:26px;font-weight:700;margin-bottom:12px;">読者アンケート集計レポート</div>
      <div style="font-size:16px;color:#aaa;margin-bottom:48px;">${loadedIssues.join(' ・ ')}</div>
      <table style="width:100%;border-collapse:collapse;font-size:14px;">
        <thead>
          <tr style="background:#e8b84b;color:#000;">
            <th style="padding:12px 14px;text-align:left;">号</th>
            <th style="padding:12px 14px;">総回答数</th>
            <th style="padding:12px 14px;">男性比率</th>
            <th style="padding:12px 14px;">女性比率</th>
            <th style="padding:12px 14px;">市内率</th>
            <th style="padding:12px 14px;">最多年代</th>
          </tr>
        </thead>
        <tbody>${tableRows}</tbody>
      </table>
      <div style="position:absolute;bottom:24px;font-size:12px;color:#666;">生成日時: ${new Date().toLocaleString('ja-JP')}</div>
    `;

    document.body.appendChild(coverEl);
    await new Promise(r => setTimeout(r, 400));

    const coverCanvas = await html2canvas(coverEl, {
      scale: 2, backgroundColor: '#1a1a1a', logging: false,
      width: 794, windowWidth: 794,
    });
    document.body.removeChild(coverEl);

    const coverImg = coverCanvas.toDataURL('image/png');
    const coverH = W * coverCanvas.height / coverCanvas.width;
    pdf.addImage(coverImg, 'PNG', 0, 0, W, Math.min(coverH, H));

    // ===== 各号ページ（スクリーンショット方式）=====
    const savedIssue = currentIssue;
    const target = document.querySelector('.main');

    for (let idx = 0; idx < loadedIssues.length; idx++) {
      const issue = loadedIssues[idx];
      msg.textContent = issue + ' をキャプチャ中... (' + (idx + 1) + '/' + loadedIssues.length + ')';

      currentIssue = issue;
      renderAll();
      const panel = document.getElementById('settingsPanel');
      if (panel) panel.style.display = 'none';
      const banner = document.querySelector('.connect-banner');
      if (banner) banner.style.display = 'none';

      await new Promise(r => setTimeout(r, 800));

      const canvas = await html2canvas(target, {
        scale: 2, useCORS: true, backgroundColor: '#0d0d0d',
        logging: false, windowWidth: 1200,
      });

      const imgData = canvas.toDataURL('image/png');
      const imgAspect = canvas.height / canvas.width;
      const drawW = W;
      const drawH = drawW * imgAspect;

      pdf.addPage();

      if (drawH <= H) {
        pdf.addImage(imgData, 'PNG', 0, 0, drawW, drawH);
      } else {
        const totalPages = Math.ceil(drawH / H);
        for (let p = 0; p < totalPages; p++) {
          if (p > 0) pdf.addPage();
          const srcY = (p * H / drawH) * canvas.height;
          const srcH = Math.min((H / drawH) * canvas.height, canvas.height - srcY);
          const partCanvas = document.createElement('canvas');
          partCanvas.width = canvas.width;
          partCanvas.height = srcH;
          const ctx = partCanvas.getContext('2d');
          ctx.drawImage(canvas, 0, srcY, canvas.width, srcH, 0, 0, canvas.width, srcH);
          const partImg = partCanvas.toDataURL('image/png');
          const partH = (srcH / canvas.height) * drawH;
          pdf.addImage(partImg, 'PNG', 0, 0, drawW, partH);
        }
      }

      if (banner) banner.style.display = '';
    }

    currentIssue = savedIssue;
    renderAll();

    msg.textContent = 'PDFを保存中...';
    const today = new Date().toLocaleDateString('ja-JP').replace(/\//g, '-');
    pdf.save('FREEC_\u30a2\u30f3\u30b1\u30fc\u30c8\u96c6\u8a08_' + today + '.pdf');

  } catch (e) {
    alert('PDF生成中にエラーが発生しました: ' + e.message);
    console.error(e);
  } finally {
    overlay.classList.remove('active');
  }
}

// ====== 起動 ======
window.addEventListener('load', async () => {
  buildTabs();
  renderAll();

  // 起動時に全URLを自動読み込み（失敗してもサイレント）
  for (const [issue, url] of Object.entries(ISSUE_URLS)) {
    await loadIssueFromUrl(issue, url, true);
  }

  // 5分ごとに全登録URLを自動更新
  setInterval(async () => {
    for (const [issue, url] of Object.entries(ISSUE_URLS)) {
      await loadIssueFromUrl(issue, url, true);
    }
    document.getElementById('last-updated').textContent = '最終更新: ' + new Date().toLocaleString('ja-JP');
  }, 5 * 60 * 1000);
});
