<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>フリーペーパー 読者アンケート集計</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-datalabels/2.2.0/chartjs-plugin-datalabels.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700;900&family=Bebas+Neue&display=swap');

  :root {
    --bg: #0d0d0d;
    --surface: #161616;
    --card: #1e1e1e;
    --border: #2a2a2a;
    --accent: #e8b84b;
    --accent2: #c0392b;
    --text: #f0f0f0;
    --muted: #888;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    min-height: 100vh;
  }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 20px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 4px;
    color: var(--accent);
  }

  .logo span { color: var(--text); font-size: 13px; font-family: 'Noto Sans JP', sans-serif; font-weight: 300; display: block; letter-spacing: 2px; margin-top: -4px; }

  .status-bar {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 12px;
    color: var(--muted);
  }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #27ae60;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  #last-updated { font-size: 11px; color: var(--muted); }

  .issue-tabs {
    display: flex;
    gap: 0;
    padding: 20px 32px 0;
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
  }

  .tab {
    padding: 10px 20px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    border-bottom: 3px solid transparent;
    color: var(--muted);
    white-space: nowrap;
    transition: all 0.2s;
    background: none;
    border-top: none;
    border-left: none;
    border-right: none;
  }

  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  .main {
    padding: 28px 32px;
    max-width: 1400px;
    margin: 0 auto;
  }

  .kpi-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 16px;
    margin-bottom: 28px;
  }

  .kpi {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    position: relative;
    overflow: hidden;
  }

  .kpi::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--accent);
  }

  .kpi-label {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .kpi-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 42px;
    color: var(--accent);
    line-height: 1;
  }

  .kpi-sub { font-size: 11px; color: var(--muted); margin-top: 4px; }

  .charts-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 20px;
  }

  .charts-grid.wide { grid-template-columns: 1fr; }

  .chart-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
  }

  .chart-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .chart-title::before {
    content: '';
    width: 4px; height: 16px;
    background: var(--accent);
    border-radius: 2px;
  }

  .chart-wrap {
    position: relative;
    height: 240px;
  }

  .chart-wrap.tall { height: 320px; }

  .divider-label {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 12px 0 4px;
    border-top: 1px solid var(--border);
    margin-top: 8px;
  }

  .source-note {
    text-align: center;
    font-size: 11px;
    color: var(--muted);
    padding: 20px;
    border-top: 1px solid var(--border);
    margin-top: 8px;
  }

  /* Google連携バナー */
  .connect-banner {
    background: linear-gradient(135deg, #1a1a2e, #16213e);
    border: 1px solid #e8b84b44;
    border-radius: 12px;
    padding: 20px 24px;
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }

  .connect-banner .info { flex: 1; }
  .connect-banner .title { font-size: 14px; font-weight: 700; color: var(--accent); margin-bottom: 4px; }
  .connect-banner .desc { font-size: 12px; color: var(--muted); line-height: 1.6; }

  .connect-input {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-shrink: 0;
  }

  .connect-input input {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    color: var(--text);
    font-size: 12px;
    width: 320px;
    outline: none;
    font-family: 'Noto Sans JP', sans-serif;
  }

  .connect-input input:focus { border-color: var(--accent); }

  .btn {
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 8px;
    padding: 8px 16px;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    white-space: nowrap;
    transition: opacity 0.2s;
  }

  .btn:hover { opacity: 0.85; }
  .btn.secondary { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
  .btn.pdf { background: #c0392b; color: #fff; }

  /* PDFオーバーレイ */
  #pdf-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 9999;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
  }
  #pdf-overlay.active { display: flex; }
  #pdf-overlay .msg { color: #fff; font-size: 14px; font-family: 'Noto Sans JP', sans-serif; }
  #pdf-overlay .spinner {
    width: 48px; height: 48px;
    border: 4px solid #333;
    border-top-color: #e8b84b;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 768px) {
    .charts-grid { grid-template-columns: 1fr; }
    .connect-banner { flex-direction: column; }
    .connect-input { width: 100%; }
    .connect-input input { width: 100%; }
    header { padding: 16px 20px; }
    .main { padding: 20px; }
    .issue-tabs { padding: 16px 20px 0; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    FREEC
    <span>すすきの フリーペーパー</span>
  </div>
  <div class="status-bar">
    <div class="status-dot"></div>
    <span>自動集計</span>
    <span id="last-updated">—</span>
    <button class="btn pdf" onclick="exportPDF()" style="margin-left:12px;">📄 PDFレポート出力</button>
  </div>
</header>

<!-- PDFレンダリング中オーバーレイ -->
<div id="pdf-overlay">
  <div class="spinner"></div>
  <div class="msg" id="pdf-msg">PDFを生成しています...</div>
</div>

<div class="issue-tabs" id="issueTabs"></div>

<div class="main">

  <div class="connect-banner">
    <div class="info">
      <div class="title">📊 号ごとのGoogleフォーム連携設定</div>
      <div class="desc">各号のGoogleスプレッドシートCSV公開URLを登録すると、タブに自動追加されリアルタイムで集計されます。<br>設定方法：スプレッドシート → ファイル → 共有 → 「Webに公開」→ CSV形式でURLをコピー</div>
    </div>
    <button class="btn" onclick="toggleSettings()">⚙️ URL設定を開く</button>
  </div>

  <div id="settingsPanel" style="display:none; background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:24px; margin-bottom:24px;">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
      <div style="font-size:13px; font-weight:700; color:var(--accent); letter-spacing:1px;">号ごとのCSV URL登録</div>
      <button class="btn secondary" onclick="toggleSettings()">✕ 閉じる</button>
    </div>
    <div id="urlList" style="display:flex; flex-direction:column; gap:10px; margin-bottom:16px;"></div>
    <div style="display:flex; gap:8px; align-items:center; padding-top:12px; border-top:1px solid var(--border);">
      <select id="newIssueName" style="background:var(--card); border:1px solid var(--border); border-radius:8px; padding:8px 12px; color:var(--text); font-size:12px; font-family:'Noto Sans JP',sans-serif; outline:none;">
        <option value="">── 号を選択 ──</option>
        <option value="3月号">3月号</option>
        <option value="4月号">4月号</option>
        <option value="5月号">5月号</option>
        <option value="6月号">6月号</option>
        <option value="7月号">7月号</option>
        <option value="8月号">8月号</option>
        <option value="9月号">9月号</option>
        <option value="10月号">10月号</option>
        <option value="11月号">11月号</option>
        <option value="12月号">12月号</option>
      </select>
      <input type="text" id="newIssueUrl" placeholder="GoogleスプレッドシートのCSV公開URL" style="flex:1; background:var(--card); border:1px solid var(--border); border-radius:8px; padding:8px 12px; color:var(--text); font-size:12px; outline:none; font-family:'Noto Sans JP',sans-serif;" />
      <button class="btn" onclick="addIssueUrl()">＋ 追加して読み込む</button>
    </div>
    <div style="font-size:11px; color:var(--muted); margin-top:10px;">💡 登録したURLは5分ごとに自動更新されます</div>
  </div>

  <div class="kpi-row" id="kpiRow"></div>

  <div class="charts-grid">
    <div class="chart-card">
      <div class="chart-title">男女比</div>
      <div class="chart-wrap"><canvas id="genderChart"></canvas></div>
    </div>
    <div class="chart-card">
      <div class="chart-title">居住地</div>
      <div class="chart-wrap"><canvas id="locationChart"></canvas></div>
    </div>
  </div>

  <div class="charts-grid">
    <div class="chart-card">
      <div class="chart-title">年代別</div>
      <div class="chart-wrap"><canvas id="ageChart"></canvas></div>
    </div>
    <div class="chart-card">
      <div class="chart-title">来訪目的</div>
      <div class="chart-wrap"><canvas id="purposeChart"></canvas></div>
    </div>
  </div>

  <div class="charts-grid wide">
    <div class="chart-card">
      <div class="chart-title">よく行くお店ジャンル</div>
      <div class="chart-wrap tall"><canvas id="genreChart"></canvas></div>
    </div>
  </div>

  <div class="source-note" id="sourceNote">表示中：サンプルデータ（3月号・4月号）　|　Googleスプレッドシート連携で自動更新されます</div>
</div>

<script>
// ====== データ定義 ======
const ISSUES = {
  '3月号': {
    total: 33,
    gender: { '男性': 19, '女性': 14 },
    location: { '札幌市内': 27, '札幌市外（道内）': 5, '道外': 0, '海外': 1 },
    age: { '20代': 9, '30代': 9, '40代': 5, '50代': 10, '60代': 0, '70代以上': 0 },
    purpose: { '観光': 2, '出張（道内）': 0, '出張（道外）': 0, '帰省': 0, '日常利用（地元）': 22, '仕事（地元）': 9 },
    genre: { 'バー': 14, 'ダーツバー': 5, 'シーシャバー': 1, 'カジュアルバー': 7, 'コンセプトバー': 1, 'カジュアルパブ': 0, 'ライブ': 3, 'ショー': 0, 'クラブ': 0, 'ガールズバー': 2, 'スナック': 12, 'パブ': 0, 'ニュークラブ': 2, 'ラウンジ': 0 }
  },
  '4月号': {
    total: 66,
    gender: { '男性': 35, '女性': 31 },
    location: { '札幌市内': 57, '札幌市外（道内）': 9, '道外': 0, '海外': 0 },
    age: { '20代': 19, '30代': 20, '40代': 15, '50代': 6, '60代': 5, '70代以上': 1 },
    purpose: { '観光': 5, '出張（道内）': 1, '出張（道外）': 0, '帰省': 1, '日常利用（地元）': 42, '仕事（地元）': 17 },
    genre: { 'バー': 43, 'ダーツバー': 9, 'シーシャバー': 3, 'カジュアルバー': 12, 'コンセプトバー': 2, 'カジュアルパブ': 1, 'ライブ': 13, 'ショー': 1, 'クラブ': 3, 'ガールズバー': 5, 'スナック': 13, 'パブ': 3, 'ニュークラブ': 8, 'ラウンジ': 4 }
  }
};

const PALETTE = {
  accent: '#e8b84b',
  red:    '#c0392b',
  blue:   '#2980b9',
  green:  '#27ae60',
  purple: '#8e44ad',
  orange: '#e67e22',
  teal:   '#16a085',
  pink:   '#e91e63',
};

const MULTI_COLORS = [
  '#e8b84b','#c0392b','#2980b9','#27ae60','#8e44ad','#e67e22','#16a085','#e91e63','#f39c12','#1abc9c','#3498db','#9b59b6','#e74c3c','#2ecc71'
];

let currentIssue = '4月号';
let charts = {};

// ====== 号タブ生成 ======
function buildTabs() {
  const container = document.getElementById('issueTabs');
  const issues = Object.keys(ISSUES);
  // 未来の号も追加
  const allIssues = ['3月号','4月号','5月号','6月号','7月号','8月号','9月号','10月号','11月号','12月号'];
  allIssues.forEach(issue => {
    const btn = document.createElement('button');
    btn.className = 'tab' + (issue === currentIssue ? ' active' : '');
    btn.textContent = issue;
    btn.disabled = !ISSUES[issue];
    if (!ISSUES[issue]) btn.style.opacity = '0.3';
    btn.onclick = () => selectIssue(issue, btn);
    container.appendChild(btn);
  });
}

function selectIssue(issue, btn) {
  if (!ISSUES[issue]) return;
  currentIssue = issue;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  renderAll();
}

// ====== KPI ======
function renderKPI(data) {
  const row = document.getElementById('kpiRow');
  const genderTotal = Object.values(data.gender).reduce((a,b)=>a+b,0);
  const maleRate = Math.round(data.gender['男性'] / genderTotal * 100);
  const localRate = Math.round((data.location['札幌市内'] || 0) / Object.values(data.location).reduce((a,b)=>a+b,0) * 100);
  const topAge = Object.entries(data.age).sort((a,b)=>b[1]-a[1])[0][0];
  const topPurpose = Object.entries(data.purpose).sort((a,b)=>b[1]-a[1])[0][0];

  row.innerHTML = `
    <div class="kpi"><div class="kpi-label">総回答数</div><div class="kpi-value">${data.total}</div><div class="kpi-sub">件</div></div>
    <div class="kpi"><div class="kpi-label">男性比率</div><div class="kpi-value">${maleRate}%</div><div class="kpi-sub">女性 ${100-maleRate}%</div></div>
    <div class="kpi"><div class="kpi-label">札幌市内率</div><div class="kpi-value">${localRate}%</div><div class="kpi-sub">地元読者</div></div>
    <div class="kpi"><div class="kpi-label">最多年代</div><div class="kpi-value" style="font-size:28px;padding-top:8px">${topAge}</div><div class="kpi-sub"> </div></div>
    <div class="kpi"><div class="kpi-label">主な来訪目的</div><div class="kpi-value" style="font-size:16px;padding-top:10px">${topPurpose}</div><div class="kpi-sub"> </div></div>
  `;
}

// datalabelsプラグイン登録
Chart.register(ChartDataLabels);

// ====== ラベル共通ヘルパー ======
function pct(value, data) {
  const total = data.reduce((a, b) => a + b, 0);
  return total > 0 ? Math.round(value / total * 100) : 0;
}

// ====== グラフ共通設定 ======
const commonTooltip = {
  backgroundColor: '#1e1e1e',
  borderColor: '#333',
  borderWidth: 1,
  titleColor: '#e8b84b',
  bodyColor: '#ccc',
  callbacks: {
    label: ctx => {
      const total = ctx.dataset.data.reduce((a,b)=>a+b,0);
      const p = total > 0 ? Math.round(ctx.parsed * 100 / total) : 0;
      return ` ${ctx.label}: ${ctx.parsed}件 (${p}%)`;
    }
  }
};

function destroyChart(id) {
  if (charts[id]) { charts[id].destroy(); delete charts[id]; }
}

// ====== グラフ描画 ======
function renderGender(data) {
  destroyChart('gender');
  const labels = Object.keys(data.gender).filter(k => data.gender[k] > 0);
  const values = labels.map(k => data.gender[k]);
  charts.gender = new Chart(document.getElementById('genderChart'), {
    type: 'doughnut',
    data: {
      labels,
      datasets: [{ data: values, backgroundColor: [PALETTE.blue, PALETTE.pink], borderWidth: 0 }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      cutout: '55%',
      plugins: {
        legend: { labels: { color: '#ccc', font: { family: 'Noto Sans JP', size: 11 }, padding: 12, boxWidth: 12 } },
        tooltip: commonTooltip,
        datalabels: {
          color: '#fff',
          font: { family: 'Noto Sans JP', size: 12, weight: 'bold' },
          formatter: (value, ctx) => {
            const p = pct(value, ctx.dataset.data);
            return p > 0 ? `${value}件\n${p}%` : '';
          },
          textAlign: 'center',
          display: ctx => ctx.dataset.data[ctx.dataIndex] > 0
        }
      }
    }
  });
}

function renderLocation(data) {
  destroyChart('location');
  const entries = Object.entries(data.location).filter(([,v]) => v > 0);
  const labels = entries.map(([k]) => k);
  const values = entries.map(([,v]) => v);
  charts.location = new Chart(document.getElementById('locationChart'), {
    type: 'doughnut',
    data: {
      labels,
      datasets: [{ data: values, backgroundColor: [PALETTE.accent, PALETTE.green, PALETTE.orange, PALETTE.purple], borderWidth: 0 }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      cutout: '55%',
      plugins: {
        legend: { labels: { color: '#ccc', font: { family: 'Noto Sans JP', size: 11 }, padding: 12, boxWidth: 12 } },
        tooltip: commonTooltip,
        datalabels: {
          color: '#fff',
          font: { family: 'Noto Sans JP', size: 11, weight: 'bold' },
          formatter: (value, ctx) => {
            const p = pct(value, ctx.dataset.data);
            return p > 0 ? `${value}件\n${p}%` : '';
          },
          textAlign: 'center',
          display: ctx => ctx.dataset.data[ctx.dataIndex] > 0
        }
      }
    }
  });
}

function makeBarDatalabels(values, anchor, align, offsetVal) {
  return {
    color: '#eee',
    font: { family: 'Noto Sans JP', size: 10, weight: 'bold' },
    anchor: anchor || 'end',
    align: align || 'end',
    offset: offsetVal !== undefined ? offsetVal : 4,
    formatter: (value, ctx) => {
      if (!value) return '';
      const p = pct(value, ctx.dataset.data);
      return `${value}件 (${p}%)`;
    },
    display: ctx => ctx.dataset.data[ctx.dataIndex] > 0
  };
}

function renderAge(data) {
  destroyChart('age');
  const labels = Object.keys(data.age);
  const values = Object.values(data.age);
  const maxVal = Math.max(...values);
  charts.age = new Chart(document.getElementById('ageChart'), {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        data: values,
        backgroundColor: labels.map((_, i) => MULTI_COLORS[i % MULTI_COLORS.length] + 'cc'),
        borderColor: labels.map((_, i) => MULTI_COLORS[i % MULTI_COLORS.length]),
        borderWidth: 1,
        borderRadius: 6
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      layout: { padding: { top: 28 } },
      plugins: {
        legend: { display: false },
        tooltip: commonTooltip,
        datalabels: makeBarDatalabels(values)
      },
      scales: {
        x: { ticks: { color: '#aaa', font: { family: 'Noto Sans JP', size: 11 } }, grid: { display: false } },
        y: { ticks: { color: '#aaa', font: { family: 'Noto Sans JP', size: 11 } }, grid: { color: '#2a2a2a' }, beginAtZero: true, max: Math.ceil(maxVal * 1.3) }
      }
    }
  });
}

function renderPurpose(data) {
  destroyChart('purpose');
  const entries = Object.entries(data.purpose).filter(([,v]) => v > 0);
  const labels = entries.map(([k]) => k);
  const values = entries.map(([,v]) => v);
  const maxVal = Math.max(...values);
  charts.purpose = new Chart(document.getElementById('purposeChart'), {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        data: values,
        backgroundColor: PALETTE.teal + 'cc',
        borderColor: PALETTE.teal,
        borderWidth: 1,
        borderRadius: 6
      }]
    },
    options: {

// ====== CSV解析 ======
async function loadIssueFromUrl(issueName, url, silent = false) {
  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const text = await res.text();

    function parseCSVRow(line) {
      const result = [];
      let cur = '', inQ = false;
      for (let i = 0; i < line.length; i++) {
        const c = line[i];
        if (c === '"') { inQ = !inQ; }
        else if (c === ',' && !inQ) { result.push(cur.trim()); cur = ''; }
        else { cur += c; }
      }
      result.push(cur.trim());
      return result;
    }

    const lines = text.split('\n').filter(l => l.trim());
    if (lines.length < 2) throw new Error('データが不足しています');

    const headers = parseCSVRow(lines[0]);
    const idxGender  = headers.findIndex(h => h.includes('性別'));
    const idxLoc     = headers.findIndex(h => h.includes('住まい') || h.includes('居住'));
    const idxAge     = headers.findIndex(h => h.includes('年代'));
    const idxPurpose = headers.findIndex(h => h.includes('目的'));
    const idxGenre   = headers.findIndex(h => h.includes('ジャンル'));

    const dataRows = lines.slice(1).map(parseCSVRow).filter(r => r.length > 1 && r.some(c => c));
    const newData = { total: dataRows.length, gender: {}, location: {}, age: {}, purpose: {}, genre: {} };

    dataRows.forEach(row => {
      const count = (obj, key) => { const k = key && key.trim(); if (k) obj[k] = (obj[k] || 0) + 1; };
      if (idxGender >= 0)  count(newData.gender,   row[idxGender]);
      if (idxLoc >= 0)     count(newData.location,  row[idxLoc]);
      if (idxAge >= 0)     count(newData.age,        row[idxAge]);
      if (idxPurpose >= 0) count(newData.purpose,    row[idxPurpose]);
      if (idxGenre >= 0) {
        row[idxGenre].split(/[,、]/).forEach(g => {
          const g2 = g.replace(/^"|"$/g,'').trim();
          if (g2) newData.genre[g2] = (newData.genre[g2] || 0) + 1;
        });
      }
    });

    ISSUES[issueName] = newData;
    rebuildTabs();
    currentIssue = issueName;
    document.querySelectorAll('.tab').forEach(t => {
      t.classList.toggle('active', t.dataset.issue === issueName);
    });
    renderAll();
    document.getElementById('sourceNote').textContent =
      `${issueName} Googleフォーム連携　|　回答数 ${newData.total}件　|　${new Date().toLocaleString('ja-JP')} 取得`;
    return true;
  } catch(e) {
    if (!silent) {
      alert(`⚠️ ${issueName} の読み込みに失敗しました。\nURLとスプレッドシートの公開設定を確認してください。\n\nエラー: ${e.message}`);
    } else {
      console.warn(`[自動更新] ${issueName} の読み込みをスキップ: ${e.message}`);
    }
    return false;
  }
}

// ====== PDF出力（全画像方式）======
async function exportPDF() {
  const loadedIssues = Object.keys(ISSUES);
  if (loadedIssues.length === 0) {
    alert('データが読み込まれていません。先にGoogleスプレッドシートを連携してください。');
    return;
  }

  const overlay = document.getElementById('pdf-overlay');
  const msg = document.getElementById('pdf-msg');
  overlay.classList.add('active');

  try {
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
    const W = 210, H = 297;
    const savedIssue = currentIssue;
    let firstPage = true;

    // ヘッダーとタブを除いた .main 部分だけキャプチャ
    const target = document.querySelector('.main');

    for (let idx = 0; idx < loadedIssues.length; idx++) {
      const issue = loadedIssues[idx];
      msg.textContent = issue + ' をキャプチャ中... (' + (idx + 1) + '/' + loadedIssues.length + ')';

      currentIssue = issue;
      renderAll();
      // settingsPanelを必ず閉じる
      const panel = document.getElementById('settingsPanel');
      if (panel) panel.style.display = 'none';
      // connect-bannerも非表示
      const banner = document.querySelector('.connect-banner');
      if (banner) banner.style.display = 'none';

      await new Promise(r => setTimeout(r, 1000));

      const canvas = await html2canvas(target, {
        scale: 2,
        useCORS: true,
        backgroundColor: '#0d0d0d',
        logging: false,
        windowWidth: 1200,
      });

      const imgData = canvas.toDataURL('image/png');
      const imgAspect = canvas.height / canvas.width;
      const drawW = W;
      const drawH = drawW * imgAspect;

      if (!firstPage) pdf.addPage();
      firstPage = false;

      if (drawH <= H) {
        // 1ページに収まる
        pdf.addImage(imgData, 'PNG', 0, 0, drawW, drawH);
      } else {
        // 複数ページに分割
        const pageContentH = H;
        const totalPages = Math.ceil(drawH / pageContentH);
        for (let p = 0; p < totalPages; p++) {
          if (p > 0) pdf.addPage();
          const srcY = (p * pageContentH / drawH) * canvas.height;
          const srcH = Math.min((pageContentH / drawH) * canvas.height, canvas.height - srcY);
          // 部分キャンバス作成
          const partCanvas = document.createElement('canvas');
          partCanvas.width = canvas.width;
          partCanvas.height = srcH;
          const ctx = partCanvas.getContext('2d');
          ctx.drawImage(canvas, 0, srcY, canvas.width, srcH, 0, 0, canvas.width, srcH);
          const partImg = partCanvas.toDataURL('image/png');
          const partH = (srcH / canvas.height) * drawH;
          pdf.addImage(partImg, 'PNG', 0, 0, drawW, partH);
        }
      }

      // banner戻す
      if (banner) banner.style.display = '';
    }

    currentIssue = savedIssue;
    renderAll();

    msg.textContent = 'PDFを保存中...';
    const today = new Date().toLocaleDateString('ja-JP').replace(/\//g, '-');
    pdf.save('FREEC_アンケート集計_' + today + '.pdf');

  } catch (e) {
    alert('PDF生成中にエラーが発生しました: ' + e.message);
    console.error(e);
  } finally {
    overlay.classList.remove('active');
  }
}

buildTabs();
  const remaining = Object.keys(ISSUES);
  if (remaining.length > 0) {
    currentIssue = remaining[remaining.length - 1];
    renderAll();
  }
}

function exportPDF() {

    return;
  }

  // 印刷用ウィンドウを生成
  const printWin = window.open('', '_blank');

  // 各号のデータをHTML化
  function pct(val, total) {
    return total > 0 ? Math.round(val / total * 100) : 0;
  }

  let pagesHTML = '';

  loadedIssues.forEach((issue, idx) => {
    const data = ISSUES[issue];
    const gt = Object.values(data.gender).reduce((a,b)=>a+b,0);
    const maleR = pct(data.gender['男性']||0, gt);
    const lt = Object.values(data.location).reduce((a,b)=>a+b,0);
    const localR = pct(data.location['札幌市内']||0, lt);
    const topAge = Object.entries(data.age).sort((a,b)=>b[1]-a[1])[0][0];
    const topPurpose = Object.entries(data.purpose).sort((a,b)=>b[1]-a[1])[0][0];

    // グラフをcanvasからdataURLで取得（現在表示中の号）
    // 各号のbar chartを簡易SVGで生成
    function barSVG(obj, color, maxW=300) {
      const entries = Object.entries(obj).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1]);
      const maxVal = Math.max(...entries.map(([,v])=>v));
      const rowH = 24;
      const svgH = entries.length * rowH + 10;
      const colors2 = ['#e8b84b','#c0392b','#2980b9','#27ae60','#8e44ad','#e67e22','#16a085','#e91e63'];
      let rows = entries.map(([k,v],i) => {
        const w = Math.round((v / maxVal) * maxW);
        const p = pct(v, entries.reduce((a,[,b])=>a+b,0));
        return `<g transform="translate(0,${i*rowH})">
          <text x="0" y="16" font-size="11" fill="#333" font-family="sans-serif">${k}</text>
          <rect x="80" y="5" width="${w}" height="14" rx="3" fill="${colors2[i%colors2.length]}"/>
          <text x="${80+w+5}" y="16" font-size="10" fill="#555" font-family="sans-serif">${v}件(${p}%)</text>
        </g>`;
      }).join('');
      return `<svg width="460" height="${svgH}" xmlns="http://www.w3.org/2000/svg">${rows}</svg>`;
    }

    function pieSVG(obj, colors2) {
      const entries = Object.entries(obj).filter(([,v])=>v>0);
      const total = entries.reduce((a,[,v])=>a+v,0);
      const cx=90, cy=80, r=65;
      let startAngle = -Math.PI/2;
      let slices = '';
      let legend = '';
      entries.forEach(([k,v],i) => {
        const angle = (v/total)*Math.PI*2;
        const endAngle = startAngle + angle;
        const x1=cx+r*Math.cos(startAngle), y1=cy+r*Math.sin(startAngle);
        const x2=cx+r*Math.cos(endAngle), y2=cy+r*Math.sin(endAngle);
        const large = angle > Math.PI ? 1 : 0;
        const midAngle = startAngle + angle/2;
        const lx=cx+(r*0.65)*Math.cos(midAngle), ly=cy+(r*0.65)*Math.sin(midAngle);
        const p = pct(v, total);
        slices += `<path d="M${cx},${cy} L${x1},${y1} A${r},${r} 0 ${large},1 ${x2},${y2} Z" fill="${colors2[i%colors2.length]}" stroke="white" stroke-width="2"/>`;
        if(p > 3) slices += `<text x="${lx}" y="${ly}" text-anchor="middle" dominant-baseline="middle" font-size="10" fill="white" font-family="sans-serif" font-weight="bold">${p}%</text>`;
        legend += `<g transform="translate(0,${i*20})"><rect width="12" height="12" rx="2" fill="${colors2[i%colors2.length]}"/><text x="16" y="10" font-size="11" fill="#333" font-family="sans-serif">${k}: ${v}件</text></g>`;
        startAngle = endAngle;
      });
      return `<svg width="320" height="170" xmlns="http://www.w3.org/2000/svg">
        ${slices}
        <g transform="translate(185,20)">${legend}</g>
      </svg>`;
    }

    const gColors = ['#2980b9','#e91e63','#27ae60','#e67e22'];
    const lColors = ['#e8b84b','#27ae60','#e67e22','#8e44ad'];

    pagesHTML += `
    <div class="page">
      <div class="page-header">
        <span class="logo-text">FREEC</span>
        <span class="issue-name">${issue} 集計結果</span>
        <span class="date">${new Date().toLocaleDateString('ja-JP')}</span>
      </div>

      <div class="kpi-row">
        <div class="kpi"><div class="kpi-label">総回答数</div><div class="kpi-val">${data.total}件</div></div>
        <div class="kpi"><div class="kpi-label">男性比率</div><div class="kpi-val">${maleR}%</div></div>
        <div class="kpi"><div class="kpi-label">女性比率</div><div class="kpi-val">${100-maleR}%</div></div>
        <div class="kpi"><div class="kpi-label">市内率</div><div class="kpi-val">${localR}%</div></div>
        <div class="kpi"><div class="kpi-label">最多年代</div><div class="kpi-val">${topAge}</div></div>
      </div>

      <div class="chart-row">
        <div class="chart-box">

        </div>
        <div class="chart-box">
          <div class="chart-label">居住地</div>
          ${pieSVG(data.location, lColors)}
        </div>
      </div>

      <div class="chart-box full">
        <div class="chart-label">年代別</div>
        ${barSVG(data.age, '#e8b84b')}
      </div>

      <div class="chart-box full">
        <div class="chart-label">来訪目的</div>
        ${barSVG(data.purpose, '#16a085')}
      </div>

      <div class="chart-box full">
        <div class="chart-label">よく行くジャンル</div>
        ${barSVG(data.genre, '#e8b84b')}
      </div>
    </div>
    `;
  });

  const html = `<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>FREEC アンケート集計レポート</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  .page { width: 210mm; min-height: 297mm; padding: 12mm 14mm; page-break-after: always; border-bottom: 2px solid #eee; }

  printWin.document.write(html);

}

    alert('データが読み込まれていません。先にGoogleスプレッドシートを連携してください。');
    return;
  }
  const overlay = document.getElementById('pdf-overlay');
  const msg = document.getElementById('pdf-msg');
  overlay.classList.add('active');
  try {
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
    const W = 210, H = 297;
    const savedIssue = currentIssue;
    let firstPage = true;

    for (let idx = 0; idx < loadedIssues.length; idx++) {
      const issue = loadedIssues[idx];
      msg.textContent = issue + ' をキャプチャ中... (' + (idx + 1) + '/' + loadedIssues.length + ')';
      currentIssue = issue;
      renderAll();
      await new Promise(r => setTimeout(r, 900));

      const target = document.querySelector('.main');
      const canvas = await html2canvas(target, {
        scale: 1.5, useCORS: true, backgroundColor: '#0d0d0d', logging: false,
      });
      const imgData = canvas.toDataURL('image/jpeg', 0.92);
      const imgH = (canvas.height / canvas.width) * W;

      if (!firstPage) pdf.addPage();
      firstPage = false;

      pdf.setFillColor(26, 26, 26);
      pdf.rect(0, 0, W, 10, 'F');
      pdf.setFillColor(232, 184, 75);
      pdf.rect(0, 0, W, 2, 'F');
      pdf.setTextColor(232, 184, 75);
      pdf.setFont('helvetica', 'bold');
      pdf.setFontSize(11);
      pdf.text('FREEC', 15, 7.5);
      pdf.setTextColor(180, 180, 180);
      pdf.setFont('helvetica', 'normal');
      pdf.setFontSize(8);
      pdf.text('Reader Survey  ' + issue, W / 2, 7.5, { align: 'center' });
      pdf.setTextColor(100, 100, 100);
      pdf.text(new Date().toLocaleDateString('ja-JP'), W - 15, 7.5, { align: 'right' });

      const availH = H - 12;
      const drawH = Math.min(imgH, availH);
      const drawW = imgH > availH ? W * (availH / imgH) : W;
      const drawX = (W - drawW) / 2;
      pdf.addImage(imgData, 'JPEG', drawX, 11, drawW, drawH);
    }

    currentIssue = savedIssue;
    renderAll();
    msg.textContent = 'PDFを保存中...';
    const today = new Date().toLocaleDateString('ja-JP').replace(/\//g, '-');
    pdf.save('FREEC_アンケート集計_' + today + '.pdf');
  } catch (e) {
    alert('PDF生成中にエラーが発生しました: ' + e.message);
    console.error(e);
  } finally {
    overlay.classList.remove('active');
  }
}

buildTabs();
  const remaining = Object.keys(ISSUES);
  if (remaining.length > 0) {
    currentIssue = remaining[remaining.length - 1];
    renderAll();
  }
}

// ====== タブ再構築 ======
function rebuildTabs() {
  const container = document.getElementById('issueTabs');
  container.innerHTML = '';
  const ORDER = ['3月号','4月号','5月号','6月号','7月号','8月号','9月号','10月号','11月号','12月号'];
  ORDER.forEach(issue => {
    const btn = document.createElement('button');
    btn.className = 'tab' + (issue === currentIssue ? ' active' : '');
    btn.dataset.issue = issue;
    const hasLive = !!ISSUE_URLS[issue];
    btn.textContent = issue + (hasLive ? ' 🔴' : '');
    if (!ISSUES[issue]) { btn.style.opacity = '0.3'; btn.disabled = true; }
    btn.onclick = () => selectIssue(issue, btn);
    container.appendChild(btn);
  });
}

// ====== PDF出力 ======
async function exportPDF() {
  const loadedIssues = Object.keys(ISSUES);
  if (loadedIssues.length === 0) {
    alert('データが読み込まれていません。先にGoogleスプレッドシートを連携してください。');
    return;
  }

  const overlay = document.getElementById('pdf-overlay');
  const msg = document.getElementById('pdf-msg');
  overlay.classList.add('active');

  try {
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
    const W = 210, H = 297;
    const margin = 15;
    const accent = [232, 184, 75];
    const dark = [26, 26, 26];

    // ===== 表紙 =====
    msg.textContent = '表紙を作成中...';
    pdf.setFillColor(...dark);
    pdf.rect(0, 0, W, H, 'F');

    pdf.setFillColor(...accent);
    pdf.rect(0, 0, W, 4, 'F');
    pdf.rect(0, H - 4, W, 4, 'F');

    pdf.setTextColor(...accent);
    pdf.setFont('helvetica', 'bold');
    pdf.setFontSize(36);
    pdf.text('FREEC', W / 2, 80, { align: 'center' });

    pdf.setTextColor(200, 200, 200);
    pdf.setFontSize(13);
    pdf.text('Reader Survey Report', W / 2, 92, { align: 'center' });

    pdf.setFillColor(...accent);
    pdf.rect(margin, 105, W - margin * 2, 0.5, 'F');

    pdf.setTextColor(240, 240, 240);
    pdf.setFontSize(16);
    pdf.text('\u8aad\u8005\u30a2\u30f3\u30b1\u30fc\u30c8\u96c6\u8a08\u30ec\u30dd\u30fc\u30c8', W / 2, 118, { align: 'center' });

    const issueLabel = loadedIssues.join(' \u30fb ');
    pdf.setFontSize(12);
    pdf.setTextColor(180, 180, 180);
    pdf.text(issueLabel, W / 2, 130, { align: 'center' });

    // サマリーテーブル
    const tableTop = 150;
    const cols = ['\u53f7', '\u7dcf\u56de\u7b54\u6570', '\u7537\u6027\u6bd4\u7387', '\u5973\u6027\u6bd4\u7387', '\u5e02\u5185\u7387', '\u6700\u591a\u5e74\u4ee3'];
    const colWidths = [20, 30, 28, 28, 28, 28];
    let cx = margin;
    pdf.setFillColor(...accent);
    pdf.rect(margin, tableTop, W - margin * 2, 9, 'F');
    pdf.setTextColor(0, 0, 0);
    pdf.setFontSize(9);
    cols.forEach((col, i) => {
      pdf.text(col, cx + colWidths[i] / 2, tableTop + 6, { align: 'center' });
      cx += colWidths[i];
    });

    loadedIssues.forEach((issue, ri) => {
      const data = ISSUES[issue];
      const gt = Object.values(data.gender).reduce((a, b) => a + b, 0);
      const maleR = gt ? Math.round(data.gender['\u7537\u6027'] / gt * 100) : 0;
      const lt = Object.values(data.location).reduce((a, b) => a + b, 0);
      const localR = lt ? Math.round((data.location['\u672d\u5e4c\u5e02\u5185'] || 0) / lt * 100) : 0;
      const topAge = Object.entries(data.age).sort((a, b) => b[1] - a[1])[0][0];
      const rowVals = [issue, `${data.total}\u4ef6`, `${maleR}%`, `${100 - maleR}%`, `${localR}%`, topAge];
      const rowY = tableTop + 9 + ri * 10;
      pdf.setFillColor(ri % 2 === 0 ? 40 : 50, ri % 2 === 0 ? 40 : 50, ri % 2 === 0 ? 40 : 50);
      pdf.rect(margin, rowY, W - margin * 2, 10, 'F');
      cx = margin;
      pdf.setTextColor(220, 220, 220);
      pdf.setFontSize(9);
      rowVals.forEach((val, i) => {
        pdf.text(val, cx + colWidths[i] / 2, rowY + 6.5, { align: 'center' });
        cx += colWidths[i];
      });
    });

    pdf.setTextColor(120, 120, 120);
    pdf.setFontSize(8);
    pdf.text(`\u751f\u6210\u65e5\u6642: ${new Date().toLocaleString('ja-JP')}`, W / 2, H - 20, { align: 'center' });

    // ===== 各号ページ =====
    const savedIssue = currentIssue;

    for (let idx = 0; idx < loadedIssues.length; idx++) {
      const issue = loadedIssues[idx];
      msg.textContent = `${issue} のグラフを描画中... (${idx + 1}/${loadedIssues.length})`;

      // 一時的にその号に切り替えて描画
      currentIssue = issue;
      renderAll();
      await new Promise(r => setTimeout(r, 600));

      pdf.addPage();

      // ヘッダー
      pdf.setFillColor(...dark);
      pdf.rect(0, 0, W, H, 'F');
      pdf.setFillColor(...accent);
      pdf.rect(0, 0, W, 12, 'F');
      pdf.setTextColor(0, 0, 0);
      pdf.setFont('helvetica', 'bold');
      pdf.setFontSize(14);
      pdf.text(`FREEC  ${issue}  \u96c6\u8a08\u7d50\u679c`, margin, 8.5);

      // KPI
      const data = ISSUES[issue];
      const gt = Object.values(data.gender).reduce((a, b) => a + b, 0);
      const maleR = gt ? Math.round(data.gender['\u7537\u6027'] / gt * 100) : 0;
      const lt = Object.values(data.location).reduce((a, b) => a + b, 0);
      const localR = lt ? Math.round((data.location['\u672d\u5e4c\u5e02\u5185'] || 0) / lt * 100) : 0;
      const topAge = Object.entries(data.age).sort((a, b) => b[1] - a[1])[0][0];
      const topPurpose = Object.entries(data.purpose).sort((a, b) => b[1] - a[1])[0][0];

      const kpis = [
        ['\u7dcf\u56de\u7b54\u6570', `${data.total}\u4ef6`],
        ['\u7537\u6027\u6bd4\u7387', `${maleR}%`],
        ['\u5973\u6027\u6bd4\u7387', `${100 - maleR}%`],
        ['\u5e02\u5185\u7387', `${localR}%`],
        ['\u6700\u591a\u5e74\u4ee3', topAge],
      ];
      const kpiW = (W - margin * 2) / kpis.length;
      kpis.forEach(([label, val], i) => {
        const kx = margin + i * kpiW;
        pdf.setFillColor(35, 35, 35);
        pdf.roundedRect(kx + 1, 16, kpiW - 2, 20, 2, 2, 'F');
        pdf.setFillColor(...accent);
        pdf.rect(kx + 1, 16, kpiW - 2, 1.5, 'F');
        pdf.setTextColor(140, 140, 140);
        pdf.setFontSize(7);
        pdf.setFont('helvetica', 'normal');
        pdf.text(label, kx + kpiW / 2, 22, { align: 'center' });
        pdf.setTextColor(...accent);
        pdf.setFontSize(14);
        pdf.setFont('helvetica', 'bold');
        pdf.text(val, kx + kpiW / 2, 32, { align: 'center' });
      });

      // チャートキャプチャ
      const chartIds = [
        { id: 'genderChart', x: margin, y: 42, w: 82, h: 55 },
        { id: 'locationChart', x: margin + 88, y: 42, w: 82, h: 55 },
        { id: 'ageChart', x: margin, y: 102, w: W - margin * 2, h: 50 },
        { id: 'purposeChart', x: margin, y: 157, w: W - margin * 2, h: 55 },
        { id: 'genreChart', x: margin, y: 217, w: W - margin * 2, h: 65 },
      ];

      for (const { id, x, y, w, h } of chartIds) {
        const canvas = document.getElementById(id);
        if (!canvas) continue;
        const imgData = canvas.toDataURL('image/png');
        pdf.setFillColor(30, 30, 30);
        pdf.roundedRect(x, y, w, h, 2, 2, 'F');
        pdf.addImage(imgData, 'PNG', x + 2, y + 2, w - 4, h - 4);
      }
    }

    // 元の号に戻す
    currentIssue = savedIssue;
    renderAll();

    msg.textContent = 'PDFを保存中...';
    const today = new Date().toLocaleDateString('ja-JP').replace(/\//g, '-');
    pdf.save(`FREEC_\u30a2\u30f3\u30b1\u30fc\u30c8\u96c6\u8a08_${today}.pdf`);

  } catch (e) {
    alert('PDF生成中にエラーが発生しました: ' + e.message);
    console.error(e);
  } finally {
    overlay.classList.remove('active');
  }
}


buildTabs();
renderAll();

// 起動時に全URLを自動読み込み
(async () => {
  for (const [issue, url] of Object.entries(ISSUE_URLS)) {
    await loadIssueFromUrl(issue, url, true);
  }
})();

// 5分ごとに全登録URLを自動更新
setInterval(async () => {
  const entries = Object.entries(ISSUE_URLS);
  for (const [issue, url] of entries) {
    await loadIssueFromUrl(issue, url, true);
  }
  if (entries.length === 0) {
    document.getElementById('last-updated').textContent = '最終更新: ' + new Date().toLocaleString('ja-JP');
  }
}, 5 * 60 * 1000);
</script>
